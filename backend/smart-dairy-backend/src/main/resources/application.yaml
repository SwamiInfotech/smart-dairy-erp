spring:
  application:
    name: smart-dairy-backend

  datasource:
    # JDBC URL format for PostgreSQL
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:smart_dairy}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:root}
    driver-class-name: org.postgresql.Driver

    # HikariCP Connection Pool Settings (Spring Boot Default)
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1800000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    hibernate:
      # Use 'update' for dev, 'validate' or 'none' for production
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20
          order_inserts: true
          order_updates: true

  flyway:
    validate-on-migrate: false
    baseline-on-migrate: false

# Optional Logging Configuration for Debugging SQL Queries
logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE


server:
  port: 8081

app:
  tenant:
    default-id: ${APP_TENANT_DEFAULT_ID:00000000-0000-0000-0000-000000000001}
    header-name: ${APP_TENANT_HEADER_NAME:X-Tenant-Id}
  security:
    default-user:
      username: ${APP_SECURITY_DEFAULT_USERNAME:admin}
      password: ${APP_SECURITY_DEFAULT_PASSWORD:admin123}
      full-name: ${APP_SECURITY_DEFAULT_FULL_NAME:Default Admin}
      role: ${APP_SECURITY_DEFAULT_ROLE:ADMIN}
      sync-existing: ${APP_SECURITY_DEFAULT_SYNC_EXISTING:true}
    jwt:
      secret: ${APP_SECURITY_JWT_SECRET:smart-dairy-super-secret-key-change-me}
      expiration-ms: ${APP_SECURITY_JWT_EXPIRATION_MS:86400000}
