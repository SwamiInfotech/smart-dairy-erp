spring:
  application:
    name: smart-dairy-backend

  datasource:
    # JDBC URL format for PostgreSQL
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:smart_dairy}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:root}
    driver-class-name: org.postgresql.Driver

    # HikariCP Connection Pool Settings (Spring Boot Default)
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1800000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    hibernate:
      # Use 'update' for dev, 'validate' or 'none' for production
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20
          order_inserts: true
          order_updates: true

  flyway:
    validate-on-migrate: false
    baseline-on-migrate: false

# Optional Logging Configuration for Debugging SQL Queries
logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE


server:
  port: 8081
